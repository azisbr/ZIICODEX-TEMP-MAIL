<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZIICODEX TEMP-MAIL</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #020c02;
    --bg2: #040f04;
    --card: #071407;
    --border: #0f5f0f;
    --green: #00ff41;
    --green2: #00cc33;
    --green3: #005c14;
    --green-dim: rgba(0,255,65,0.08);
    --green-glow: rgba(0,255,65,0.25);
    --red: #ff2244;
    --red-dim: rgba(255,34,68,0.12);
    --blue: #00aaff;
    --text: #c8ffc8;
    --text-dim: #4a8a4a;
    --font-mono: 'Share Tech Mono', monospace;
    --font-head: 'Orbitron', monospace;
    --font-retro: 'VT323', monospace;
  }

  .light-mode {
    --bg: #e8f5e8;
    --bg2: #d4eed4;
    --card: #f0faf0;
    --border: #44aa44;
    --green: #006600;
    --green2: #008800;
    --green3: #cceecc;
    --green-dim: rgba(0,102,0,0.08);
    --green-glow: rgba(0,102,0,0.2);
    --text: #003300;
    --text-dim: #446644;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Matrix Rain Canvas */
  #matrix-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.04;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,65,0.015) 2px,
      rgba(0,255,65,0.015) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  /* CRT Vignette */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 1;
  }

  .app-wrapper {
    position: relative;
    z-index: 2;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 80px 0;
    min-height: 100vh;
  }

  /* ===== HEADER ===== */
  .header {
    padding: 20px 20px 0;
    position: relative;
  }

  .header-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0 12px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }

  .header-inner::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0;
    width: 60%;
    height: 1px;
    background: linear-gradient(90deg, var(--green), transparent);
    animation: scanLine 3s ease-in-out infinite;
  }

  @keyframes scanLine {
    0%, 100% { width: 0%; opacity: 0; }
    50% { width: 80%; opacity: 1; }
  }

  .logo-wrap {
    display: flex;
    flex-direction: column;
  }

  .logo-tag {
    font-family: var(--font-retro);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .logo-main {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 2px;
    line-height: 1;
    position: relative;
  }

  .logo-zii {
    color: var(--green);
    text-shadow: 0 0 10px var(--green), 0 0 20px var(--green2);
    animation: glitch 4s infinite;
  }

  .logo-codex {
    color: var(--text);
    opacity: 0.85;
  }

  .logo-tm {
    display: block;
    font-family: var(--font-retro);
    font-size: 13px;
    color: var(--green2);
    letter-spacing: 4px;
    margin-top: 2px;
  }

  @keyframes glitch {
    0%, 90%, 100% { 
      text-shadow: 0 0 10px var(--green), 0 0 20px var(--green2);
      transform: none;
    }
    92% { 
      text-shadow: -2px 0 #ff0040, 2px 0 #00ffff;
      transform: translateX(-1px);
    }
    94% { 
      text-shadow: 2px 0 #ff0040, -2px 0 #00ffff;
      transform: translateX(1px);
    }
    96% {
      text-shadow: 0 0 10px var(--green), 0 0 20px var(--green2);
      transform: none;
    }
  }

  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .icon-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--green);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .icon-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green-dim);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .icon-btn:hover::before, .icon-btn:active::before { opacity: 1; }
  .icon-btn:hover { border-color: var(--green); box-shadow: 0 0 10px var(--green-glow); }

  /* STATUS BAR */
  .status-bar {
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }

  .status-dot.offline { background: var(--red); box-shadow: 0 0 6px var(--red); animation: none; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ===== MAIN CONTENT ===== */
  .main {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* EMAIL CARD */
  .email-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    position: relative;
    overflow: hidden;
    animation: fadeSlideIn 0.5s ease forwards;
  }

  .email-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    animation: shimmer 2.5s infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
  }

  .email-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .email-label::before {
    content: '//';
    color: var(--green);
    opacity: 0.5;
  }

  .email-display {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }

  .email-address {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--green);
    word-break: break-all;
    flex: 1;
    text-shadow: 0 0 8px rgba(0,255,65,0.3);
    transition: all 0.3s;
  }

  .email-address.loading {
    animation: typing 0.8s steps(10) infinite;
  }

  @keyframes typing {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .copy-btn {
    width: 32px; height: 32px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--green);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .copy-btn:hover { background: var(--green-dim); border-color: var(--green); }
  .copy-btn.copied { color: var(--green); background: var(--green-dim); }

  /* TIMER */
  .timer-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeSlideIn 0.5s ease 0.1s both;
  }

  .timer-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .timer-icon {
    font-size: 20px;
    animation: spin 4s linear infinite;
  }

  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .timer-info { display: flex; flex-direction: column; gap: 2px; }

  .timer-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .timer-value {
    font-family: var(--font-retro);
    font-size: 28px;
    line-height: 1;
    color: var(--green);
    text-shadow: 0 0 10px var(--green);
    letter-spacing: 2px;
  }

  .timer-value.urgent {
    color: var(--red);
    text-shadow: 0 0 10px var(--red);
    animation: blink 0.5s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .extend-btn {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--green);
    background: var(--green-dim);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .extend-btn:hover { 
    background: rgba(0,255,65,0.15); 
    border-color: var(--green);
    box-shadow: 0 0 10px var(--green-glow);
  }

  .extend-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* ACTION BUTTONS */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    animation: fadeSlideIn 0.5s ease 0.2s both;
  }

  .btn {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid;
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 1px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    text-transform: uppercase;
  }

  .btn::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    width: 0; height: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    transform: translate(-50%, -50%);
    transition: width 0.4s, height 0.4s;
  }

  .btn:active::after { width: 200px; height: 200px; }

  .btn-change {
    background: rgba(0,170,255,0.08);
    border-color: rgba(0,170,255,0.4);
    color: #00aaff;
  }

  .btn-change:hover {
    background: rgba(0,170,255,0.15);
    border-color: #00aaff;
    box-shadow: 0 0 12px rgba(0,170,255,0.3);
  }

  .btn-delete {
    background: var(--red-dim);
    border-color: rgba(255,34,68,0.4);
    color: var(--red);
  }

  .btn-delete:hover {
    background: rgba(255,34,68,0.18);
    border-color: var(--red);
    box-shadow: 0 0 12px rgba(255,34,68,0.3);
  }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn .spin { animation: rotate 0.8s linear infinite; display: inline-block; }
  @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ===== INBOX ===== */
  .inbox-section {
    animation: fadeSlideIn 0.5s ease 0.3s both;
  }

  .inbox-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 4px 10px;
  }

  .inbox-title {
    font-family: var(--font-head);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .inbox-count {
    background: var(--green);
    color: var(--bg);
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 10px;
    font-family: var(--font-head);
    min-width: 18px;
    text-align: center;
  }

  .refresh-btn {
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--green);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.2s;
  }

  .refresh-btn:hover { background: var(--green-dim); border-color: var(--green); }
  .refresh-btn.spinning svg { animation: rotate 0.6s linear infinite; }

  .auto-badge {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
    background: var(--green-dim);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
  }

  /* EMPTY STATE */
  .inbox-empty {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .empty-icon {
    font-size: 36px;
    opacity: 0.3;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .empty-title {
    font-family: var(--font-head);
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .empty-sub {
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.6;
    letter-spacing: 1px;
  }

  .empty-sub::after {
    content: '...';
    animation: dots 1.5s steps(4, end) infinite;
  }

  @keyframes dots {
    0% { content: ''; }
    25% { content: '.'; }
    50% { content: '..'; }
    75% { content: '...'; }
  }

  /* EMAIL ITEM */
  .email-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
    animation: fadeSlideIn 0.4s ease forwards;
  }

  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .email-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
  }

  .email-item.unread { border-color: rgba(0,255,65,0.35); }

  .email-item:hover {
    border-color: var(--green);
    box-shadow: 0 0 15px var(--green-glow);
    transform: translateX(2px);
  }

  .item-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }

  .item-from {
    font-size: 12px;
    color: var(--green);
    font-weight: 600;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .item-time {
    font-size: 10px;
    color: var(--text-dim);
    flex-shrink: 0;
    margin-left: 8px;
  }

  .item-subject {
    font-size: 12px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .item-preview {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .unread-dot {
    width: 7px; height: 7px;
    background: var(--green);
    border-radius: 50%;
    box-shadow: 0 0 5px var(--green);
    flex-shrink: 0;
    margin-top: 3px;
  }

  /* ===== MODAL ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    padding: 20px 20px 40px;
    position: relative;
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }

  .modal-title {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--green);
    margin-bottom: 4px;
    text-shadow: 0 0 8px var(--green-glow);
  }

  .modal-from {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 2px;
    letter-spacing: 0.5px;
  }

  .modal-date {
    font-size: 10px;
    color: var(--text-dim);
    opacity: 0.6;
    margin-bottom: 16px;
  }

  .modal-divider {
    height: 1px;
    background: linear-gradient(90deg, var(--green), transparent);
    margin: 12px 0;
    opacity: 0.4;
  }

  .modal-body {
    font-size: 13px;
    color: var(--text);
    line-height: 1.7;
    word-break: break-word;
    white-space: pre-wrap;
    text-align: center;
  }

  .modal-close {
    position: absolute;
    top: 20px; right: 20px;
    width: 30px; height: 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.2s;
  }

  .modal-close:hover { color: var(--red); border-color: var(--red); }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 8px;
    z-index: 200;
    pointer-events: none;
    max-height: 45vh;
    overflow: hidden;
  }

  .toast-item {
    background: var(--card);
    border: 1px solid var(--green);
    border-radius: 10px;
    padding: 10px 20px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--green);
    letter-spacing: 1px;
    box-shadow: 0 0 20px var(--green-glow);
    white-space: nowrap;
    opacity: 0;
    transform: translateY(40px) scale(0.95);
    transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .toast-item.show {
    opacity: 1;
    transform: translateY(0) scale(1);
  }

  .toast-item.hide {
    opacity: 0;
    transform: translateY(-20px) scale(0.95);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .toast-item.error { border-color: var(--red); color: var(--red); box-shadow: 0 0 20px rgba(255,34,68,0.3); }

  /* LOADING SCREEN */
  .loading-screen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.5s, visibility 0.5s;
  }

  .loading-screen.hidden { opacity: 0; visibility: hidden; }

  .load-logo {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 3px;
    color: var(--green);
    text-shadow: 0 0 20px var(--green);
    animation: glitch 2s infinite;
  }

  .load-bar-wrap {
    width: 180px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .load-bar {
    height: 100%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    width: 0%;
    animation: loadProgress 2s ease forwards;
  }

  @keyframes loadProgress {
    0% { width: 0%; }
    60% { width: 70%; }
    100% { width: 100%; }
  }

  .load-text {
    font-family: var(--font-retro);
    font-size: 14px;
    letter-spacing: 2px;
    color: var(--text-dim);
    animation: typing 0.5s steps(1) infinite;
  }

  /* OTP BOX */
  .otp-box {
    display: none;
    background: rgba(0,255,65,0.06);
    border: 1px solid var(--green);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 14px;
    position: relative;
    box-shadow: 0 0 18px var(--green-glow);
    animation: fadeSlideIn 0.3s ease forwards;
  }

  .otp-box.visible { display: block; }

  .otp-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);

    margin-bottom: 8px;
    display: flex;
    align-items: center;

  }

  .otp-label::before { content: '//'; color: var(--green); opacity: 0.5; }

  .otp-row {
    display: flex;

    justify-content: space-between;
    gap: 12px;

  .otp-code {
    font-family: var(--font-retro);
    font-size: 42px;
    line-height: 1;
    color: var(--green);
    text-shadow: 0 0 16px var(--green), 0 0 30px rgba(0,255,65,0.3);
    letter-spacing: 6px;
    flex: 1;
  }

  .otp-copy-btn {
    background: var(--green);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-family: var(--font-head);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;

  .otp-copy-btn:hover { box-shadow: 0 0 14px var(--green-glow); transform: scale(1.04); }
  .otp-copy-btn.copied { background: var(--green2); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--green); }
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="app-wrapper">

    <div class="header-inner">
      <div class="logo-wrap">
        <span class="logo-tag">// SECURE TEMP MAIL</span>
        <div class="logo-main">

          <button class="refresh-btn" id="refreshBtn" title="Refresh">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/>

      <div id="inboxList">

<!-- Email Detail Modal -->
<div class="modal-overlay" id="emailModal">
  <div class="modal">
    <div class="modal-handle"></div>
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-title" id="modalSubject"></div>
    <div class="modal-from" id="modalFrom"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="otp-box" id="otpBox">
      <div class="otp-label">OTP / VERIFICATION CODE DETECTED</div>
      <div class="otp-row">
        <div class="otp-code" id="otpCode"></div>
        <button class="otp-copy-btn" id="otpCopyBtn">COPY</button>
      </div>
    </div>
    <div class="modal-divider"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ===== MATRIX RAIN =====
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const chars = 'ZIICODEX01アイウエオカキクケコサシスセソタチツテトナニヌネノ';
const fontSize = 12;
let drops = [];

function initDrops() {
  const cols = Math.floor(canvas.width / fontSize);
  drops = Array(cols).fill(1);
}
initDrops();

function drawMatrix() {
  ctx.fillStyle = 'rgba(2,12,2,0.05)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = `${fontSize}px Share Tech Mono`;
  drops.forEach((y, i) => {
    const char = chars[Math.floor(Math.random() * chars.length)];
    ctx.fillText(char, i * fontSize, y * fontSize);
    if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
    drops[i]++;
  });
}

setInterval(drawMatrix, 50);

// ===== LOADING =====
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('loadingScreen').classList.add('hidden');
    init();
  }, 2200);
});

// ===== APP STATE =====
let state = {
  email: null,
  token: null,
  accountId: null,
  password: null,
  provider: 0,
  messages: [],
  timerSeconds: 600,
  timerInterval: null,
  autoRefreshInterval: null,
  isLight: false,
};

// ===== TOAST =====
const TOAST_DURATION = 4000;
const TOAST_MAX_HEIGHT_RATIO = 0.45; // max 45vh from bottom

function showToast(msg, isError = false) {
  const container = document.getElementById('toastContainer');
  const maxBottom = window.innerHeight * TOAST_MAX_HEIGHT_RATIO;

  // Create new toast
  const t = document.createElement('div');
  t.className = 'toast-item' + (isError ? ' error' : '');
  t.textContent = msg;
  container.appendChild(t);

  // Trigger enter animation
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      t.classList.add('show');
    });
  });

  // Check if any toast exceeds max height — remove oldest if so
  function pruneOverflow() {
    const items = container.querySelectorAll('.toast-item');
    items.forEach(item => {
      const rect = item.getBoundingClientRect();
      const distFromBottom = window.innerHeight - rect.top;
      if (distFromBottom > maxBottom) {
        dismissToast(item);
      }
    });
  }

  setTimeout(pruneOverflow, 350);

  // Auto dismiss after duration
  const timer = setTimeout(() => dismissToast(t), TOAST_DURATION);
  t._dismissTimer = timer;
}

function dismissToast(t) {
  if (t._dismissed) return;
  t._dismissed = true;
  clearTimeout(t._dismissTimer);
  t.classList.remove('show');
  t.classList.add('hide');
  setTimeout(() => t.remove(), 350);
}

// ===== THEME TOGGLE =====
document.getElementById('themeToggle').addEventListener('click', () => {
  state.isLight = !state.isLight;
  document.body.classList.toggle('light-mode', state.isLight);
  document.getElementById('themeToggle').textContent = state.isLight ? '☀️' : '🌙';
  showToast(state.isLight ? '[ LIGHT MODE ]' : '[ DARK MODE ]');
});

// ===== TIMER =====
function startTimer(seconds = 600) {
  clearInterval(state.timerInterval);
  state.timerSeconds = seconds;
  updateTimerDisplay();
  state.timerInterval = setInterval(() => {
    state.timerSeconds--;
    updateTimerDisplay();
    if (state.timerSeconds <= 0) {
      clearInterval(state.timerInterval);
      showToast('[ EMAIL EXPIRED — GENERATING NEW ]', true);
      setTimeout(generateEmail, 1000);
    }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(state.timerSeconds / 60).toString().padStart(2, '0');
  const s = (state.timerSeconds % 60).toString().padStart(2, '0');
  const el = document.getElementById('timerDisplay');
  el.textContent = `${m}:${s}`;
  el.className = 'timer-value' + (state.timerSeconds <= 60 ? ' urgent' : '');
}

document.getElementById('extendBtn').addEventListener('click', () => {
  state.timerSeconds += 600;
  updateTimerDisplay();
  showToast('[ +10 MIN EXTENDED ]');
});

// ===== PROVIDERS =====
const PROVIDERS = [
  {
    name: 'mail.tm',
    async generate() {
      const domRes = await fetch('https://api.mail.tm/domains');
      if (!domRes.ok) throw new Error('mail.tm domains failed');
      const domData = await domRes.json();
      const domain = domData['hydra:member'][0].domain;
      const rand = Math.random().toString(36).slice(2, 10);
      const address = `${rand}@${domain}`;
      const password = Math.random().toString(36).slice(2, 12) + 'Zx1!';
      const regRes = await fetch('https://api.mail.tm/accounts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address, password })
      });
      const regData = await regRes.json();
      if (!regRes.ok) throw new Error(regData['hydra:description'] || 'mail.tm register failed');
      const tokenRes = await fetch('https://api.mail.tm/token', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address, password })
      });
      if (!tokenRes.ok) throw new Error('mail.tm token failed');
      const tokenData = await tokenRes.json();
      return { address, token: tokenData.token, accountId: regData.id, provider: 'mail.tm' };
    },
    async fetchInbox(token) {
      const res = await fetch('https://api.mail.tm/messages', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('mail.tm inbox failed');
      const data = await res.json();
      return data['hydra:member'] || [];
    },
    async fetchMessage(token, id) {
      const res = await fetch(`https://api.mail.tm/messages/${id}`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (!res.ok) throw new Error('mail.tm message failed');
      return res.json();
    },
    async deleteAccount(token, accountId) {
      await fetch(`https://api.mail.tm/accounts/${accountId}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${token}` }
      });
    }
  },
  {
    name: 'guerrillamail',
    async generate() {
      const res = await fetch('https://api.guerrillamail.com/ajax.php?f=get_email_address&lang=en&sid_token=');
      if (!res.ok) throw new Error('guerrillamail failed');
      const data = await res.json();
      if (!data.email_addr) throw new Error('guerrillamail no address');
      return { address: data.email_addr, token: data.sid_token, accountId: data.email_addr, provider: 'guerrillamail' };
    },
    async fetchInbox(token) {
      const res = await fetch(`https://api.guerrillamail.com/ajax.php?f=check_email&seq=0&sid_token=${token}`);
      if (!res.ok) throw new Error('guerrillamail inbox failed');
      const data = await res.json();
      return (data.list || []).map(m => ({
        id: String(m.mail_id),
        from: { address: m.mail_from || 'unknown' },
        subject: m.mail_subject || '',
        intro: m.mail_excerpt || '',
        createdAt: new Date(parseInt(m.mail_timestamp) * 1000).toISOString(),
        seen: m.mail_read === '1',
      }));
    },
    async fetchMessage(token, id) {
      const res = await fetch(`https://api.guerrillamail.com/ajax.php?f=fetch_email&email_id=${id}&sid_token=${token}`);
      if (!res.ok) throw new Error('guerrillamail message failed');
      const m = await res.json();
      const tmp = document.createElement('div');
      tmp.innerHTML = m.mail_body || '';
      return {
        subject: m.mail_subject || '',
        from: { address: m.mail_from || 'unknown' },
        createdAt: new Date(parseInt(m.mail_timestamp) * 1000).toISOString(),
        text: tmp.innerText || m.mail_body || '(empty)',
      };
    },
    async deleteAccount() { /* no delete needed */ }
  },
  {
    name: 'tempmail.lol',
    async generate() {
      const res = await fetch('https://api.tempmail.lol/generate');
      if (!res.ok) throw new Error('tempmail.lol generate failed');
      const data = await res.json();
      // tempmail.lol returns { address, token }
      if (!data.address || !data.token) throw new Error('tempmail.lol bad response');
      return { address: data.address, token: data.token, accountId: null, provider: 'tempmail.lol' };
    },
    async fetchInbox(token) {
      const res = await fetch(`https://api.tempmail.lol/auth/${token}`);
      if (!res.ok) throw new Error('tempmail.lol inbox failed');
      const data = await res.json();
      // normalize to mail.tm style
      return (data.email || []).map(m => ({
        id: m.id || Math.random().toString(36),
        from: { address: m.sender_name || m.from || 'unknown' },
        subject: m.subject || '',
        intro: m.body ? m.body.slice(0, 80) : '',
        createdAt: m.date || new Date().toISOString(),
        seen: false,
        _raw: m
      }));
    },
    async fetchMessage(token, id) {
      // tempmail.lol doesn't have per-message endpoint, return from inbox
      const res = await fetch(`https://api.tempmail.lol/auth/${token}`);
      const data = await res.json();
      const m = (data.email || []).find(x => x.id === id) || {};
      return {
        subject: m.subject || '',
        from: { address: m.sender_name || m.from || 'unknown' },
        createdAt: m.date || new Date().toISOString(),
        text: m.body || m.html_body || '(empty)',
      };
    },
    async deleteAccount() { /* no delete endpoint */ }
  }
];

// ===== GENERATE EMAIL =====
async function generateEmail() {
  setStatus('loading');
  const emailEl = document.getElementById('emailDisplay');
  emailEl.classList.add('loading');
  emailEl.textContent = 'GENERATING...';
  document.getElementById('changeBtn').disabled = true;
  document.getElementById('deleteBtn').disabled = true;

  let lastError = '';
  for (let i = 0; i < PROVIDERS.length; i++) {
    const provider = PROVIDERS[i];
    try {
      if (i > 0) showToast(`[ TRYING ${provider.name.toUpperCase()}... ]`);
      const result = await provider.generate();
      state.email = result.address;
      state.token = result.token;
      state.accountId = result.accountId;
      state.provider = i;
      state.messages = [];

      emailEl.classList.remove('loading');
      emailEl.textContent = result.address;
      setStatus('online');
      startTimer(600);
      startAutoRefresh();
      renderInbox([]);
      showToast(`[ EMAIL READY via ${provider.name} ]`);
      document.getElementById('changeBtn').disabled = false;
      document.getElementById('deleteBtn').disabled = false;
      return;
    } catch (e) {
      lastError = e.message || 'unknown error';
      showToast(`[ ${provider.name.toUpperCase()} FAILED: ${lastError.slice(0,30)} ]`, true);
      await new Promise(r => setTimeout(r, 600));
    }
  }

  // All providers failed
  emailEl.classList.remove('loading');
  emailEl.textContent = 'ALL PROVIDERS FAILED';
  setStatus('offline');
  showToast('[ ALL PROVIDERS DOWN — TAP CHANGE TO RETRY ]', true);
  document.getElementById('changeBtn').disabled = false;
  document.getElementById('deleteBtn').disabled = false;
}

// ===== FETCH INBOX =====
async function fetchInbox() {
  if (!state.token) return;
  try {
    const provider = PROVIDERS[state.provider ?? 0];
    const msgs = await provider.fetchInbox(state.token);
    if (msgs.length !== state.messages.length) {
      if (msgs.length > state.messages.length && state.messages.length > 0) {
        showToast(`[ ${msgs.length - state.messages.length} NEW MESSAGE(S) ]`);
      }
      state.messages = msgs;
      renderInbox(msgs);
    }
  } catch (e) {
    showToast(`[ INBOX ERROR: ${(e.message||'').slice(0,25)} ]`, true);
  }
}

function startAutoRefresh() {
  clearInterval(state.autoRefreshInterval);
  state.autoRefreshInterval = setInterval(fetchInbox, 10000);
}

// ===== RENDER INBOX =====
function renderInbox(msgs) {
  const list = document.getElementById('inboxList');
  document.getElementById('inboxCount').textContent = msgs.length;

  if (!msgs.length) {
    list.innerHTML = `
      <div class="inbox-empty">
        <div class="empty-icon">📭</div>
        <div class="empty-title">INBOX EMPTY</div>
        <div class="empty-sub">Waiting for incoming emails</div>
      </div>`;
    return;
  }

  list.innerHTML = msgs.map((m, i) => {
    const from = m.from?.address || 'unknown@sender';
    const subject = m.subject || '(No Subject)';
    const intro = m.intro || '';
    const time = new Date(m.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return `
      <div class="email-item ${!m.seen ? 'unread' : ''}" onclick="openEmail('${m.id}')" style="animation-delay:${i*0.05}s">
        <div class="item-header">
          <div class="item-from">${escHtml(from)}</div>
          <div style="display:flex;align-items:center;gap:6px;">
            ${!m.seen ? '<div class="unread-dot"></div>' : ''}
            <div class="item-time">${time}</div>
          </div>
        </div>
        <div class="item-subject">${escHtml(subject)}</div>
        <div class="item-preview">${escHtml(intro)}</div>
      </div>`;
  }).join('');
}

// ===== OPEN EMAIL =====
async function openEmail(id) {
  if (!state.token) return;
  try {
    const provider = PROVIDERS[state.provider ?? 0];
    const m = await provider.fetchMessage(state.token, id);

    document.getElementById('modalSubject').textContent = m.subject || '(No Subject)';
    document.getElementById('modalFrom').textContent = `FROM: ${m.from?.address || 'unknown'}`;
    document.getElementById('modalDate').textContent = new Date(m.createdAt).toLocaleString();
    
    let body = '';
    if (m.text) body = m.text;
    else if (m.html) {
      const tmp = document.createElement('div');
      tmp.innerHTML = m.html[0] || m.html;
      body = tmp.innerText;
    }
    document.getElementById('modalBody').textContent = body || '(Empty message)';

    // Detect OTP
    const otpMatch = (body || '').match(/\b(\d{4,8})\b/);
    const otpBox = document.getElementById('otpBox');
    const otpCode = document.getElementById('otpCode');
    if (otpMatch) {
      otpCode.textContent = otpMatch[1];
      otpBox.classList.add('visible');
    } else {
      otpBox.classList.remove('visible');
    }

    document.getElementById('emailModal').classList.add('open');

    // Mark as seen in local state
    const idx = state.messages.findIndex(x => x.id === id);
    if (idx !== -1) {
      state.messages[idx].seen = true;
      renderInbox(state.messages);
    }
  } catch (e) {
    showToast('[ FAILED TO LOAD EMAIL ]', true);
  }
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('emailModal').classList.remove('open');
});

document.getElementById('otpCopyBtn').addEventListener('click', () => {
  const code = document.getElementById('otpCode').textContent;
  const btn = document.getElementById('otpCopyBtn');
  navigator.clipboard.writeText(code).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = code;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });
  btn.textContent = 'COPIED!';
  btn.classList.add('copied');
  showToast(`[ OTP ${code} COPIED ]`);
  setTimeout(() => {
    btn.textContent = 'COPY';
    btn.classList.remove('copied');
  }, 2000);
});

document.getElementById('emailModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('emailModal')) {
    document.getElementById('emailModal').classList.remove('open');
  }
});

// ===== COPY EMAIL =====
document.getElementById('copyBtn').addEventListener('click', () => {
  if (!state.email) return;
  navigator.clipboard.writeText(state.email).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    showToast('[ EMAIL COPIED ]');
    setTimeout(() => btn.classList.remove('copied'), 1500);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = state.email;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('[ EMAIL COPIED ]');
  });
});

// ===== CHANGE EMAIL =====
document.getElementById('changeBtn').addEventListener('click', () => {
  clearInterval(state.autoRefreshInterval);
  generateEmail();
});

// ===== DELETE EMAIL =====
document.getElementById('deleteBtn').addEventListener('click', async () => {
  if (!state.token || !state.accountId) return;
  const btn = document.getElementById('deleteBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin">⟳</span> DELETING...';
  try {
    const provider = PROVIDERS[state.provider ?? 0];
    await provider.deleteAccount(state.token, state.accountId);
  } catch (e) {}
  clearInterval(state.timerInterval);
  clearInterval(state.autoRefreshInterval);
  state.email = null; state.token = null; state.accountId = null;
  document.getElementById('emailDisplay').textContent = '—';
  document.getElementById('timerDisplay').textContent = '00:00';
  renderInbox([]);
  setStatus('offline');
  showToast('[ EMAIL DELETED ]', true);
  btn.disabled = false;
  btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg> DELETE MAIL`;
  setTimeout(generateEmail, 1000);
});

// ===== REFRESH BUTTON =====
document.getElementById('refreshBtn').addEventListener('click', () => {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  fetchInbox().then(() => {
    setTimeout(() => btn.classList.remove('spinning'), 600);
    showToast('[ INBOX REFRESHED ]');
  });
});

// ===== STATUS =====
function setStatus(type) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  if (type === 'online') {
    dot.className = 'status-dot';
    text.textContent = 'SECURE CHANNEL ACTIVE — AUTO-REFRESH 10s';
  } else if (type === 'loading') {
    dot.className = 'status-dot';
    text.textContent = 'GENERATING SECURE ADDRESS...';
  } else {
    dot.className = 'status-dot offline';
    text.textContent = 'DISCONNECTED';
  }
}

// ===== UTILS =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== INIT =====
function init() {
  generateEmail();
}
</script>
</body>
</html>
